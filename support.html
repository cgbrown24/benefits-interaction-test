<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Support</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #ffffff;
      color: #001820;
      font-family: "Outfit";
    }

    .support-section {
      width: min(96vw, 1280px);
      margin: 0 auto;
    }

    .support-banner {
      position: relative;
      width: 100%;
      height: 240px;
      margin: 0 0 20px;
      overflow: hidden;
      border-radius: 14px;
      background: #DADEE0;
    }

    .support-banner img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .support-banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 40, 72, 0.66);
    }

    .support-banner-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 850px;
      padding: 30px 36px;
    }

    .panel-eyebrow,
    .detail-eyebrow {
      margin-bottom: 10px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.2px;
    }

    .support-divider {
      width: 56px;
      height: 3px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: #14D0FA;
    }

    .support-banner h1 {
      margin: 0;
      color: #ffffff;
      font-size: 30px;
      font-weight: 600;
      line-height: 1.2;
    }

    .support-intro {
      max-width: 880px;
      margin: 0 0 30px;
      color: #68747C;
      font-size: 16px;
      line-height: 1.6;
    }

    .benefit-menu {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .benefit-option {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 76px;
      padding: 16px 18px;
      border: 1px solid #DADEE0;
      border-radius: 12px;
      background: #ffffff;
      color: #074975;
      font-family: "Outfit";
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition:
        border-color 180ms ease,
        box-shadow 180ms ease,
        transform 180ms ease;
    }

    .benefit-option:hover,
    .benefit-option:focus-visible {
      border-color: #007ACC;
      box-shadow: 0 5px 14px rgba(0, 40, 72, 0.08);
      transform: translateY(-1px);
      outline: none;
    }

    .option-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 50%;
      background: #002848;
      color: #14D0FA;
    }

    .option-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
.benefit-detail {
      display: none;
    }

    .benefit-detail.visible {
      display: block;
    }

    .back-button {
      margin: 0 0 22px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #007ACC;
      font-family: "Outfit";
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .back-button:hover {
      color: #074975;
    }

    .detail-card {
      max-width: 760px;
      padding: 30px;
      border: 1px solid #DADEE0;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 6px 18px rgba(0, 40, 72, 0.07);
    }

    .detail-eyebrow {
      color: #007ACC;
    }

    .detail-card h2 {
      margin: 0 0 12px;
      color: #074975;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.25;
    }

    .detail-benefit-name {
      margin: 0 0 12px;
      color: #074975;
      font-size: 18px;
      font-weight: 600;
    }

    .detail-description {
      margin: 0 0 22px;
      color: #68747C;
      font-size: 15px;
      line-height: 1.6;
    }

    .eligibility {
      margin: 0 0 18px;
      padding-top: 18px;
      border-top: 1px solid #DADEE0;
      font-size: 13px;
      line-height: 1.7;
    }

    .eligibility-label {
      display: block;
      margin-bottom: 3px;
      color: #288410;
      font-weight: 600;
    }

    .eligibility-values {
      color: #001820;
    }

    .eligibility-divider {
      margin: 0 5px;
      color: #ACB4BC;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .learn-more,
    .access-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .learn-more {
      background: #007ACC;
      color: #ffffff;
    }

    .learn-more:hover {
      background: #074975;
    }

    .access-button {
      border: 1px solid #007ACC;
      background: #ffffff;
      color: #007ACC;
    }

    .access-button:hover {
      background: #F4FAFD;
      color: #074975;
      border-color: #074975;
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .support-banner {
        height: 260px;
      }

      .support-banner-text {
        padding: 24px;
      }

      .support-banner h1 {
        font-size: 25px;
      }

      .benefit-menu {
        grid-template-columns: 1fr;
      }
    }
  
    .option-icon > span {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      display: block;
    }

  
  .option-icon > span {
    display: block !important;
    font-family: Arial, Helvetica, sans-serif !important;
    font-size: 30px !important;
    font-weight: 400 !important;
    line-height: 1 !important;
    transform: translateY(-1px);
  }

</style>
</head>

<body>

  <main class="support-section">

    <div class="support-home" id="supportHome">

      <div class="support-banner">
        <img
          src="assets/my-support.png"
          alt="Two adults having a supportive conversation in a modern lounge">

        <div class="support-banner-overlay"></div>

        <div class="support-banner-text">
          <div class="panel-eyebrow">MY SUPPORT</div>
          <div class="support-divider" aria-hidden="true"></div>
          <h1>Support for Life’s Moments, Big and Small</h1>
        </div>
      </div>

      <p class="support-intro">
        Explore resources designed to provide guidance, assistance, and support
        when you and your loved ones need it.
      </p>

      <div class="benefit-menu">

        <button class="benefit-option" type="button" data-benefit="eap">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>TELUS Employee Assistance Program</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="crisis">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Critical Incident Community Crisis Line</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="empathy">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Empathy Support</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="voya">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Voya Cares</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="medicare">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Medicare Consulting Services</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="travel">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
        </button>

      </div>
    </div>

    <div class="benefit-detail" id="benefitDetail">
      <button class="back-button" id="backButton" type="button">
        ← Back to My Support
      </button>

      <div class="detail-card" id="detailCard"></div>
    </div>

  </main>

  <script>
    const supportHome = document.getElementById("supportHome");
    const benefitDetail = document.getElementById("benefitDetail");
    const detailCard = document.getElementById("detailCard");
    const backButton = document.getElementById("backButton");

    const eligibilityAll =
      'Regular Full-Time<span class="eligibility-divider">|</span>Regular Part-Time<span class="eligibility-divider">|</span>Per Diem / Assignment<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible';

    const benefitContent = {

      "eap": {
        eyebrow: "SUPPORT FOR EVERYDAY LIFE",
        story: "Find Support for Life’s Challenges",
        name: "TELUS Employee Assistance Program",
        description:
          "Access support for emotional well-being and everyday life events, including legal and financial consultation, child and eldercare support, community referrals, self-guided CBT programs, life coaching, online counseling scheduling and chat, and more.",
        eligibility:
          eligibilityAll,
        link:
          "https://unteked.sharepoint.com/sites/UnitekLearning/Human%20Resources/Forms/AllItems.aspx?id=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program%2FIntroduction%20to%20new%20EAP%20slides%5FVoya%5FJuly%201%2Epptx%5B94%5D%5B62%5D%2Epdf&parent=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program&p=true&ga=1",
        accessLink:
          "https://unteked.sharepoint.com/sites/UnitekLearning/Human%20Resources/Forms/AllItems.aspx?id=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program%2FUnitek%20TELUS%20Employee%20Assistance%20Program%20%28EAP%29%20Flyer%20%2D%20Employee%2EPDF&parent=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program&p=true&ga=1"
      },

      "crisis": {
        eyebrow: "SUPPORT WHEN THE UNEXPECTED HAPPENS",
        story: "Help When Your Team Needs It Most",
        name: "Critical Incident Community Crisis Line",
        description:
          "Access immediate, coordinated assistance designed to support recovery and a return to stability following events such as natural disasters, workplace accidents, sudden loss, acts of violence, or other incidents that disrupt your team.",
        eligibility:
          eligibilityAll,
        link:
          "https://unteked.sharepoint.com/sites/UnitekLearning/Human%20Resources/Forms/AllItems.aspx?id=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program%2FTELUS%20Health%20Critical%20Incident%20Support%20Flyer%2EPDF&parent=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program&p=true&ga=1"
      },

      "empathy": {
        eyebrow: "SUPPORT THROUGH LOSS",
        story: "Guidance During Difficult Moments",
        name: "Empathy Support",
        description:
          "Access bereavement support for you and your loved ones, including funeral planning and will preparation services.",
        eligibility:
          eligibilityAll,
        link:
          "https://unteked.sharepoint.com/sites/UnitekLearning/Human%20Resources/Forms/AllItems.aspx?id=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program%2FEmpathy%20Employee%20and%20Beneficiary%20Flyer%288%29%2EPDF&parent=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program&p=true&ga=1"
      },

      "voya": {
        eyebrow: "PLAN WITH THE FUTURE IN MIND",
        story: "Support for Planning Around Special Needs",
        name: "Voya Cares",
        description:
          "Access resources to help you plan for loved ones with special needs, including information about government benefits, beneficiary planning, employee benefits, and how those benefits may interact.",
        eligibility:
          eligibilityAll,
        link:
          "https://unteked.sharepoint.com/sites/UnitekLearning/Human%20Resources/Forms/AllItems.aspx?id=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program%2FVoya%20Cares%20Employee%20Flyer%2EPDF&parent=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program&p=true&ga=1"
      },

      "medicare": {
        eyebrow: "NAVIGATE YOUR NEXT STEP",
        story: "Guidance for the Transition to Medicare",
        name: "Medicare Consulting Services",
        description:
          "Access consulting support through MarshMcClellan Agency for Unitek associates and/or their spouses who are Medicare eligible or approaching eligibility and are interested in transitioning to a Medicare plan.",
        eligibility:
          eligibilityAll,
        link:
          "https://unteked.sharepoint.com/sites/UnitekLearning/Human%20Resources/Forms/AllItems.aspx?id=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FFinancial%20Wellness%2FMedicare%20Consulting%20Services%2Epdf&parent=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FFinancial%20Wellness&p=true&ga=1"
      },

      "travel": {
        eyebrow: "SUPPORT WHILE YOU ARE AWAY",
        story: "Assistance When Travel Takes You Farther From Home",
        name: "Travel Assistance Program",
        description:
          "Access travel support when traveling 100 miles or more from your primary residence, including emergency medical transport, medical assistance, travel assistance, and security assistance services.",
        eligibility:
          eligibilityAll,
        link:
          "https://unteked.sharepoint.com/sites/UnitekLearning/Human%20Resources/Forms/AllItems.aspx?id=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program%2FVoya%20Travel%20Assistance%20Wallet%20Card%2834%29%2EPDF&parent=%2Fsites%2FUnitekLearning%2FHuman%20Resources%2FBenefits%2FMental%20Wellbeing%2FEAP%20%2D%20Employee%20Assistance%20Program&p=true&ga=1"
      }

    };

    function showBenefitDetail(key) {
      const content = benefitContent[key];

      if (!content) {
        return;
      }

      const accessButtonMarkup =
        content.accessLink
          ? `
            <a
              class="access-button"
              href="${content.accessLink}"
              target="_blank"
              rel="noopener noreferrer">
              How to Access
              <span aria-hidden="true">›</span>
            </a>
          `
          : "";

      detailCard.innerHTML = `
        <div class="detail-eyebrow">
          ${content.eyebrow}
        </div>

        <h2>
          ${content.story}
        </h2>

        <div class="detail-benefit-name">
          ${content.name}
        </div>

        <p class="detail-description">
          ${content.description}
        </p>

        <div class="eligibility">
          <span class="eligibility-label">
            Eligibility
          </span>

          <span class="eligibility-values">
            ${content.eligibility}
          </span>
        </div>

        <div class="button-row">
          <a
            class="learn-more"
            href="${content.link}"
            target="_blank"
            rel="noopener noreferrer">
            Learn More
            <span aria-hidden="true">›</span>
          </a>

          ${accessButtonMarkup}
        </div>
      `;

      supportHome.style.display = "none";
      benefitDetail.classList.add("visible");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.querySelectorAll(".benefit-option").forEach(option => {
      option.addEventListener("click", () => {
        showBenefitDetail(option.dataset.benefit);
      });
    });

    backButton.addEventListener("click", () => {
      benefitDetail.classList.remove("visible");
      supportHome.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>

</body>
</html>
