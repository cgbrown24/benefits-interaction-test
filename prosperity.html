<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Prosperity</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #ffffff;
      color: #001820;
      font-family: "Outfit";
    }

    .prosperity-section {
      width: min(96vw, 1280px);
      margin: 0 auto;
    }

    .prosperity-banner {
      position: relative;
      width: 100%;
      height: 240px;
      margin: 0 0 20px;
      overflow: hidden;
      border-radius: 14px;
      background: #DADEE0;
    }

    .prosperity-banner img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .prosperity-banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 40, 72, 0.66);
    }

    .prosperity-banner-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 850px;
      padding: 30px 36px;
    }

    .panel-eyebrow,
    .detail-eyebrow {
      margin-bottom: 10px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.2px;
    }

    .prosperity-divider {
      width: 56px;
      height: 3px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: #14D0FA;
    }

    .prosperity-banner h1 {
      margin: 0;
      color: #ffffff;
      font-size: 30px;
      font-weight: 600;
      line-height: 1.2;
    }

    .prosperity-intro {
      max-width: 880px;
      margin: 0 0 30px;
      color: #68747C;
      font-size: 16px;
      line-height: 1.6;
    }

    .benefit-menu {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .benefit-option {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 76px;
      padding: 16px 18px;
      border: 1px solid #DADEE0;
      border-radius: 12px;
      background: #ffffff;
      color: #074975;
      font-family: "Outfit";
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition:
        border-color 180ms ease,
        box-shadow 180ms ease,
        transform 180ms ease;
    }

    .benefit-option:hover,
    .benefit-option:focus-visible {
      border-color: #007ACC;
      box-shadow: 0 5px 14px rgba(0, 40, 72, 0.08);
      transform: translateY(-1px);
      outline: none;
    }

    .option-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 50%;
      background: #002848;
      color: #14D0FA;
    }

    .option-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
.benefit-detail {
      display: none;
    }

    .benefit-detail.visible {
      display: block;
    }

    .back-button {
      margin: 0 0 22px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #007ACC;
      font-family: "Outfit";
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .back-button:hover {
      color: #074975;
    }

    .detail-card {
      max-width: 760px;
      padding: 30px;
      border: 1px solid #DADEE0;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 6px 18px rgba(0, 40, 72, 0.07);
    }

    .detail-eyebrow {
      color: #007ACC;
    }

    .detail-card h2 {
      margin: 0 0 12px;
      color: #074975;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.25;
    }

    .detail-benefit-name {
      margin: 0 0 12px;
      color: #074975;
      font-size: 18px;
      font-weight: 600;
    }

    .detail-description {
      margin: 0 0 22px;
      color: #68747C;
      font-size: 15px;
      line-height: 1.6;
    }

    .eligibility {
      margin: 0 0 18px;
      padding-top: 18px;
      border-top: 1px solid #DADEE0;
      font-size: 13px;
      line-height: 1.7;
    }

    .eligibility-label {
      display: block;
      margin-bottom: 3px;
      color: #288410;
      font-weight: 600;
    }

    .eligibility-values {
      color: #001820;
    }

    .eligibility-divider {
      margin: 0 5px;
      color: #ACB4BC;
    }

    .important-note {
      margin: 0 0 22px;
      padding: 14px 16px;
      border-left: 3px solid #007ACC;
      background: #F7F9FA;
      color: #68747C;
      font-size: 13px;
      line-height: 1.55;
    }

    .important-note strong {
      display: block;
      margin-bottom: 3px;
      color: #074975;
      font-weight: 600;
    }

    .learn-more {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      background: #007ACC;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .learn-more:hover {
      background: #074975;
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .prosperity-banner {
        height: 260px;
      }

      .prosperity-banner-text {
        padding: 24px;
      }

      .prosperity-banner h1 {
        font-size: 25px;
      }

      .benefit-menu {
        grid-template-columns: 1fr;
      }
    }
  
    .option-icon > span {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      display: block;
    }

  
  .option-icon > span {
    display: block !important;
    font-family: Arial, Helvetica, sans-serif !important;
    font-size: 30px !important;
    font-weight: 400 !important;
    line-height: 1 !important;
    transform: translateY(-1px);
  }

</style>
</head>

<body>

  <main class="prosperity-section">

    <div class="prosperity-home" id="prosperityHome">

      <div class="prosperity-banner">
        <img
          src="assets/my-prosperity.png"
          alt="Man planning at a kitchen island with a dog nearby">

        <div class="prosperity-banner-overlay"></div>

        <div class="prosperity-banner-text">
          <div class="panel-eyebrow">MY PROSPERITY</div>
          <div class="prosperity-divider" aria-hidden="true"></div>
          <h1>Helping you make the most of today while planning for tomorrow</h1>
        </div>
      </div>

      <p class="prosperity-intro">
        Explore benefits and resources designed to help you save, plan ahead,
        manage expenses, and build toward your financial goals.
      </p>

      <div class="benefit-menu">

        <button class="benefit-option" type="button" data-benefit="health-savings">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Health Savings Account</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="401k">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>401(k) Retirement Plan</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="fsa">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Flexible Spending Account</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="limited-fsa">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Limited Flexible Spending Account</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="dependent-care">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Dependent Care Flexible Spending Account</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="commuter">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Commuter Benefits Program</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="benefithub">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>BenefitHub Discounts &amp; Savings</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="lifemart">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>LifeMart Discounts &amp; Savings</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="pet">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Pet Insurance</span>
        </button>

      </div>
    </div>

    <div class="benefit-detail" id="benefitDetail">
      <button class="back-button" id="backButton" type="button">
        ← Back to My Prosperity
      </button>

      <div class="detail-card" id="detailCard"></div>
    </div>

  </main>

  <script>
    const prosperityHome = document.getElementById("prosperityHome");
    const benefitDetail = document.getElementById("benefitDetail");
    const detailCard = document.getElementById("detailCard");
    const backButton = document.getElementById("backButton");

    const benefitContent = {

      "health-savings": {
        eyebrow: "MANAGE HEALTHCARE EXPENSES",
        story: "Plan Ahead for Your Healthcare Needs",
        name: "Health Savings Account",
        description:
          "A Health Savings Account gives you a way to prepare for eligible healthcare expenses today and in the future. Unitek also contributes for employees enrolled in the Health Savings Account.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible',
        note:
          "You must be enrolled in the High Deductible Health Plan (HDHP) to enroll in the Health Savings Account.",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "401k": {
        eyebrow: "PLAN FOR YOUR FUTURE",
        story: "Build Toward What Comes Next",
        name: "401(k) Retirement Plan",
        description:
          "Your Unitek 401(k) Plan can help you build toward the retirement you envision. Unitek matches $0.50 for every dollar you contribute, up to 6%.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Regular Part-Time<span class="eligibility-divider">|</span>Per Diem / Assignment<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible',
        note:
          "",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "fsa": {
        eyebrow: "MANAGE HEALTHCARE EXPENSES",
        story: "Set Aside Funds for Eligible Healthcare Costs",
        name: "Flexible Spending Account",
        description:
          "Set aside funds to help cover eligible medical, dental, and vision expenses.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible',
        note:
          "Cannot be used in conjunction with a Health Savings Account.",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "limited-fsa": {
        eyebrow: "PLAN FOR DENTAL & VISION COSTS",
        story: "Save for the Care You Need",
        name: "Limited Flexible Spending Account",
        description:
          "Set aside funds to help cover eligible dental and vision expenses.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible',
        note:
          "Can be used in conjunction with a Health Savings Account.",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "dependent-care": {
        eyebrow: "SUPPORT THOSE WHO DEPEND ON YOU",
        story: "Plan for Dependent Care Expenses",
        name: "Dependent Care Flexible Spending Account",
        description:
          "Set aside funds to help cover eligible daycare or elder care expenses.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Regular Part-Time',
        note:
          "",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "commuter": {
        eyebrow: "MAKE YOUR COMMUTE WORK FOR YOU",
        story: "Plan for the Cost of Getting There",
        name: "Commuter Benefits Program",
        description:
          "Set aside funds to help cover eligible parking and public transportation expenses.",
        eligibility:
          "Regular Full-Time",
        note:
          "",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "benefithub": {
        eyebrow: "SAVE ON EVERYDAY EXPERIENCES",
        story: "Make More of the Moments You Enjoy",
        name: "BenefitHub Discounts & Savings",
        description:
          "Access discounts on travel, hotels, theme parks, tickets, electronics, and more.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Regular Part-Time<span class="eligibility-divider">|</span>Per Diem / Assignment<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible',
        note:
          "",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "lifemart": {
        eyebrow: "FIND MORE WAYS TO SAVE",
        story: "Save on the Things You Use and Enjoy",
        name: "LifeMart Discounts & Savings",
        description:
          "Access discounts on hotels, travel, electronics, and more.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Regular Part-Time<span class="eligibility-divider">|</span>Per Diem / Assignment<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible',
        note:
          "",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      },

      "pet": {
        eyebrow: "CARE FOR YOUR PETS",
        story: "Protection for the Pets You Love",
        name: "Pet Insurance",
        description:
          "Explore voluntary pet insurance available through ASPCA®.",
        eligibility:
          'Regular Full-Time<span class="eligibility-divider">|</span>Regular Part-Time<span class="eligibility-divider">|</span>Per Diem / Assignment<span class="eligibility-divider">|</span>Affordable Care Act Medical Eligible',
        note:
          "",
        link:
          "https://stacks.cdc.gov/view/cdc/107530/cdc_107530_DS1.pdf"
      }

    };

    function showBenefitDetail(key) {
      const content = benefitContent[key];

      if (!content) {
        return;
      }

      const noteMarkup =
        content.note
          ? `
            <div class="important-note">
              <strong>Important to Know</strong>
              ${content.note}
            </div>
          `
          : "";

      detailCard.innerHTML = `
        <div class="detail-eyebrow">
          ${content.eyebrow}
        </div>

        <h2>
          ${content.story}
        </h2>

        <div class="detail-benefit-name">
          ${content.name}
        </div>

        <p class="detail-description">
          ${content.description}
        </p>

        <div class="eligibility">
          <span class="eligibility-label">
            Eligibility
          </span>

          <span class="eligibility-values">
            ${content.eligibility}
          </span>
        </div>

        ${noteMarkup}

        <a
          class="learn-more"
          href="${content.link}"
          target="_blank"
          rel="noopener noreferrer">
          Learn More
          <span aria-hidden="true">›</span>
        </a>
      `;

      prosperityHome.style.display = "none";
      benefitDetail.classList.add("visible");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.querySelectorAll(".benefit-option").forEach(option => {
      option.addEventListener("click", () => {
        showBenefitDetail(option.dataset.benefit);
      });
    });

    backButton.addEventListener("click", () => {
      benefitDetail.classList.remove("visible");
      prosperityHome.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>

</body>
</html>
