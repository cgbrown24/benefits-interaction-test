name: Update Benefits Data
on:
 repository_dispatch:
   types: [update-benefits-data]
permissions:
 contents: write
jobs:
 update-benefits:
   runs-on: ubuntu-latest
   steps:
     - name: Check out repository
       uses: actions/checkout@v4
     - name: Update benefits-data.json
       env:
         BENEFITS_DATA: ${{ toJSON(github.event.client_payload.benefits) }}
       run: |
         printf '%s\n' "$BENEFITS_DATA" > benefits-data.json
     - name: Commit updated benefits data
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         git add benefits-data.json
         if git diff --cached --quiet; then
           echo "No changes to commit"
         else
           git commit -m "Update benefits data from Microsoft List"
           git push
         fi
