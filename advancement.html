<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Advancement</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      background: #ffffff;
      color: #001820;
      font-family: "Outfit";
    }

    .advancement-section {
      width: min(96vw, 1280px);
      margin: 0 auto;
    }

    .advancement-banner {
      position: relative;
      width: 100%;
      height: 240px;
      margin: 0 0 20px;
      overflow: hidden;
      border-radius: 14px;
      background: #DADEE0;
    }

    .advancement-banner img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .advancement-banner-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 40, 72, 0.66);
    }

    .advancement-banner-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 850px;
      padding: 30px 36px;
    }

    .panel-eyebrow,
    .detail-eyebrow {
      margin-bottom: 10px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1.2px;
    }

    .advancement-divider {
      width: 56px;
      height: 3px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: #14D0FA;
    }

    .advancement-banner h1 {
      margin: 0;
      color: #ffffff;
      font-size: 30px;
      font-weight: 600;
      line-height: 1.2;
    }

    .advancement-intro {
      max-width: 880px;
      margin: 0 0 30px;
      color: #68747C;
      font-size: 16px;
      line-height: 1.6;
    }

    .benefit-menu {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .benefit-option {
      display: flex;
      align-items: center;
      gap: 14px;
      min-height: 76px;
      padding: 16px 18px;
      border: 1px solid #DADEE0;
      border-radius: 12px;
      background: #ffffff;
      color: #074975;
      font-family: "Outfit";
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      transition:
        border-color 180ms ease,
        box-shadow 180ms ease,
        transform 180ms ease;
    }

    .benefit-option:hover,
    .benefit-option:focus-visible {
      border-color: #007ACC;
      box-shadow: 0 5px 14px rgba(0, 40, 72, 0.08);
      transform: translateY(-1px);
      outline: none;
    }

    .option-icon {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      border-radius: 50%;
      background: #002848;
      color: #14D0FA;
    }

    .option-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
.benefit-detail {
      display: none;
    }

    .benefit-detail.visible {
      display: block;
    }

    .back-button {
      margin: 0 0 22px;
      padding: 0;
      border: 0;
      background: transparent;
      color: #007ACC;
      font-family: "Outfit";
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .back-button:hover {
      color: #074975;
    }

    .detail-card {
      max-width: 760px;
      padding: 30px;
      border: 1px solid #DADEE0;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 6px 18px rgba(0, 40, 72, 0.07);
    }

    .detail-eyebrow {
      color: #007ACC;
    }

    .detail-card h2 {
      margin: 0 0 12px;
      color: #074975;
      font-size: 28px;
      font-weight: 600;
      line-height: 1.25;
    }

    .detail-benefit-name {
      margin: 0 0 12px;
      color: #074975;
      font-size: 18px;
      font-weight: 600;
    }

    .detail-description {
      margin: 0 0 22px;
      color: #68747C;
      font-size: 15px;
      line-height: 1.6;
    }

    .eligibility {
      margin: 0 0 18px;
      padding-top: 18px;
      border-top: 1px solid #DADEE0;
      font-size: 13px;
      line-height: 1.7;
    }

    .eligibility-label {
      display: block;
      margin-bottom: 3px;
      color: #288410;
      font-weight: 600;
    }

    .eligibility-values {
      color: #001820;
    }

    .learn-more {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      background: #007ACC;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .learn-more:hover {
      background: #074975;
    }

    @media (max-width: 760px) {
      body {
        padding: 16px;
      }

      .advancement-banner {
        height: 260px;
      }

      .advancement-banner-text {
        padding: 24px;
      }

      .advancement-banner h1 {
        font-size: 25px;
      }

      .benefit-menu {
        grid-template-columns: 1fr;
      }
    }
  
    .option-icon > span {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      display: block;
    }

  
  .option-icon > span {
    display: block !important;
    font-family: Arial, Helvetica, sans-serif !important;
    font-size: 30px !important;
    font-weight: 400 !important;
    line-height: 1 !important;
    transform: translateY(-1px);
  }

</style>
</head>

<body>

  <main class="advancement-section">

    <div class="advancement-home" id="advancementHome">

      <div class="advancement-banner">
        <img
          src="assets/my-advancement.png"
          alt="Professional learning at a laptop in a bright modern workspace">

        <div class="advancement-banner-overlay"></div>

        <div class="advancement-banner-text">
          <div class="panel-eyebrow">MY ADVANCEMENT</div>
          <div class="advancement-divider" aria-hidden="true"></div>
          <h1>Grow Your Career and Expand Your Possibilities</h1>
        </div>
      </div>

      <p class="advancement-intro">
        Explore opportunities designed to support your educational goals and help
        you continue growing personally and professionally.
      </p>

      <div class="benefit-menu">

        <button class="benefit-option" type="button" data-benefit="pathways">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Educational Pathways</span>
        </button>

        <button class="benefit-option" type="button" data-benefit="tuition">
          <span class="option-icon"><span aria-hidden="true">›</span></span>
          <span>Tuition Assistance Program</span>
        </button>

      </div>
    </div>

    <div class="benefit-detail" id="benefitDetail">
      <button class="back-button" id="backButton" type="button">
        ← Back to My Advancement
      </button>

      <div class="detail-card" id="detailCard"></div>
    </div>

  </main>

  <script>
    const advancementHome = document.getElementById("advancementHome");
    const benefitDetail = document.getElementById("benefitDetail");
    const detailCard = document.getElementById("detailCard");
    const backButton = document.getElementById("backButton");

    const benefitContent = {

      "pathways": {
        eyebrow: "CONTINUE YOUR EDUCATION",
        story: "Create a Path Toward What Comes Next",
        name: "Educational Pathways",
        description:
          "Through structured educational pathways, you can pursue higher degrees and expand your expertise without putting your career on hold.",
        eligibility:
          "Regular Full-Time",
        link:
          "https://www.uniteklearning.com/wp-content/uploads/2026/06/EducationalPathways.pdf"
      },

      "tuition": {
        eyebrow: "INVEST IN YOUR EDUCATION",
        story: "Open the Door to New Opportunities",
        name: "Tuition Assistance Program",
        description:
          "The Tuition Assistance Program helps you and your eligible family members pursue education that opens doors to new opportunities by reimbursing tuition costs.",
        eligibility:
          "Regular Full-Time",
        link:
          "https://www.uniteklearning.com/wp-content/uploads/2026/06/UL_HR_EmployeeTuition_Flyer_8.5x11_20250818-PRINT.pdf"
      }

    };

    function showBenefitDetail(key) {
      const content = benefitContent[key];

      if (!content) {
        return;
      }

      detailCard.innerHTML = `
        <div class="detail-eyebrow">
          ${content.eyebrow}
        </div>

        <h2>
          ${content.story}
        </h2>

        <div class="detail-benefit-name">
          ${content.name}
        </div>

        <p class="detail-description">
          ${content.description}
        </p>

        <div class="eligibility">
          <span class="eligibility-label">
            Eligibility
          </span>

          <span class="eligibility-values">
            ${content.eligibility}
          </span>
        </div>

        <a
          class="learn-more"
          href="${content.link}"
          target="_blank"
          rel="noopener noreferrer">
          Learn More
          <span aria-hidden="true">›</span>
        </a>
      `;

      advancementHome.style.display = "none";
      benefitDetail.classList.add("visible");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.querySelectorAll(".benefit-option").forEach(option => {
      option.addEventListener("click", () => {
        showBenefitDetail(option.dataset.benefit);
      });
    });

    backButton.addEventListener("click", () => {
      benefitDetail.classList.remove("visible");
      advancementHome.style.display = "block";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>

</body>
</html>
